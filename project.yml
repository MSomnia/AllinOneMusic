name: AllinOneMusicPlayer
options:
  bundleIdPrefix: com.msomnia
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  AllinOneMusicPlayer:
    type: application
    platform: macOS
    sources:
      - AllinOneMusicPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.msomnia.AllinOneMusicPlayer
        PRODUCT_NAME: AllinOneMusicPlayer
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AllinOne Music Player
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
